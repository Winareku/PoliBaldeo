<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PoliBaldeo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap"
    rel="stylesheet" />
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
    rel="stylesheet" />
  <style>
    :root {
      --bg: #121212;
      --surface: #1e1e1e;
      --surface-variant: #2c2c2c;
      --primary: #9ecaff;
      --on-primary: #003258;
      --primary-container: #1e2b3a;
      --on-primary-container: #d1e4ff;
      --error: #ffb4ab;
      --outline: #8b8d9b;
      --outline-variant: #3a3b47;
      --text-main: #e5e3ef;
      --text-sub: #c5c5d4;
      --radius-card: 24px;
      --radius-pill: 100px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    body {
      width: 460px;
      height: 600px;
      background: var(--bg);
      color: var(--text-main);
      font-family: 'Plus Jakarta Sans', sans-serif;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .sym {
      font-family: 'Material Symbols Outlined';
      font-weight: 400;
      font-style: normal;
      font-size: 20px;
      display: inline-flex;
      align-items: center;
      justify-content: center
    }

    header {
      background: var(--surface);
      padding: 18px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid var(--outline-variant);
    }

    .brand h1 {
      font-size: 18px;
      font-weight: 700
    }

    .brand p {
      font-size: 11px;
      color: var(--text-sub)
    }

    .counter {
      margin-left: auto;
      background: var(--primary-container);
      color: var(--on-primary-container);
      padding: 4px 14px;
      border-radius: 100px;
      font-size: 12px;
      font-weight: 700;
    }

    .toolbar {
      padding: 16px 20px;
      display: flex;
      gap: 10px;
      border-bottom: 1px solid var(--outline-variant);
    }

    .btn {
      border: none;
      border-radius: 100px;
      padding: 10px 16px;
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      cursor: pointer;
      transition: all .2s;
      background: var(--surface-variant);
      color: var(--text-main);
    }

    .btn .sym {
      font-size: 18px
    }

    .btn-planner {
      background: var(--primary);
      color: var(--on-primary);
      flex: 2
    }

    .btn-export {
      background: var(--primary-container);
      color: var(--on-primary-container)
    }

    .btn-clear {
      background: transparent;
      border: 1px solid var(--outline-variant);
      color: var(--text-sub)
    }

    .btn-clear:hover {
      background: rgba(255, 255, 255, 0.05);
      color: var(--error)
    }

    main {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      padding: 16px 20px
    }

    main::-webkit-scrollbar {
      width: 4px
    }

    main::-webkit-scrollbar-track {
      background: transparent
    }

    main::-webkit-scrollbar-thumb {
      background: var(--outline-variant);
      border-radius: 8px
    }

    main::-webkit-scrollbar-thumb:hover {
      background: var(--outline)
    }

    #empty-state {
      height: 200px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--text-sub);
      text-align: center;
      gap: 10px;
    }

    .materia-card {
      background: var(--surface);
      border: 1px solid var(--outline-variant);
      border-radius: 24px;
      margin-bottom: 14px;
    }

    .materia-header {
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .materia-name {
      font-weight: 700;
      font-size: 14px;
      color: var(--primary);
      flex: 1;
      cursor: pointer;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .creditos-stepper {
      display: flex;
      align-items: center;
      background: var(--surface-variant);
      border-radius: 100px;
      padding: 2px;
    }

    .creditos-stepper button {
      width: 28px;
      height: 28px;
      border: none;
      border-radius: 100px;
      background: transparent;
      color: var(--text-main);
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    .creditos-stepper button:hover {
      background: rgba(255, 255, 255, 0.08)
    }

    .creditos-value {
      min-width: 28px;
      text-align: center;
      font-weight: 700;
      font-size: 13px;
    }

    .paralelo-list {
      padding: 0 16px 16px;
      display: flex;
      flex-direction: column;
      gap: 10px
    }

    .materia-card.collapsed .paralelo-list {
      display: none
    }

    .paralelo-item {
      background: var(--surface-variant);
      border: 1px solid var(--outline-variant);
      border-radius: 20px;
      padding: 12px 14px;
    }

    .paralelo-top {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px
    }

    .paralelo-badge {
      background: var(--primary-container);
      color: var(--on-primary-container);
      padding: 2px 10px;
      border-radius: 100px;
      font-size: 10px;
      font-weight: 700;
    }

    .paralelo-prof {
      font-size: 11px;
      font-weight: 600;
      flex: 1
    }

    .horario-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 4px
    }

    .horario-tag {
      font-size: 10px;
      background: #1a1a1a;
      border: 1px solid var(--outline-variant);
      padding: 2px 8px;
      border-radius: 100px;
      color: var(--text-sub);
    }

    .materia-controls {
      display: flex;
      gap: 2px
    }

    .ctrl-btn {
      background: var(--primary-container);
      color: var(--on-primary-container);
      border: none;
      border-radius: 100px;
      width: 26px;
      height: 26px;
      cursor: pointer;
      font-size: 12px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .paralelo-delete {
      background: transparent;
      color: var(--error);
      border: none;
      cursor: pointer;
      font-size: 16px;
      padding: 4px;
      border-radius: 50%;
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #status-bar {
      padding: 10px 20px;
      font-size: 12px;
      font-weight: 600;
      text-align: center;
      background: var(--surface);
      border-top: 1px solid var(--outline-variant);
    }

    #status-bar.success {
      color: #6dd58c
    }

    #status-bar.warning {
      color: var(--error)
    }
  </style>
</head>

<body>
  <header>
    <span class="sym">calendar_month</span>
    <div class="brand">
      <h1>PoliBaldeo</h1>
    </div>
    <span class="counter" id="total-counter">0 mat.</span>
  </header>
  <div class="toolbar">
    <button class="btn btn-planner" id="btn-planner"><span class="sym">open_in_new</span> Planner</button>
    <button class="btn btn-export" id="btn-export"><span class="sym">download</span> .poli</button>
    <button class="btn btn-clear" id="btn-clear"><span class="sym">delete</span></button>
  </div>
  <main id="materias-container">
    <div id="empty-state">
      <span class="sym">school</span>
      <p>No has añadido materias</p>
      <p style="font-size:11px;opacity:.7">Usa el botón "Añadir" en el Académico</p>
    </div>
    <div id="materias-list"></div>
  </main>
  <div id="status-bar"></div>

  <!-- ═══════════════════════════════════════════════════════════
       ORDEN DE CARGA DE SCRIPTS (NO MODIFICAR)
       1. utils.js    → constantes y funciones puras
       2. storage.js  → capa chrome.storage
       3. exporter.js → generación de archivo .poli
       4. popup-ui.js → renderizado de tarjetas
       5. popup.js    → orquestador: listeners y arranque
       ═══════════════════════════════════════════════════════════ -->
  <script src="../shared/utils.js"></script>
  <script src="../shared/storage.js"></script>
  <script src="../shared/exporter.js"></script>
  <script src="popup-ui.js"></script>
  <script src="popup.js"></script>
</body>

</html>
