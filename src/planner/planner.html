<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Polibaldeo — Planner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
    rel="stylesheet" />
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
    rel="stylesheet" />
  <style>
    /* ── Material 3 Dark Palette ── */
    :root {
      --bg: #121212;
      --surface: #1e1e1e;
      --surf-c: #252525;
      --surf-ch: #2c2c2c;
      --surf-var: #313131;
      --primary: #9ecaff;
      --on-primary: #003258;
      --primary-c: #004880;
      --on-prim-c: #d1e4ff;
      --on-surf: #e5e3ef;
      --on-surf-var: #c5c5d4;
      --outline: #8b8d9b;
      --outline-var: #3a3b47;
      --error: #ffb4ab;
      --enrolled: #6dd58c;
      --enrolled-c: #003914;
      --elev-1: rgba(158, 202, 255, .05);
      --elev-2: rgba(158, 202, 255, .08);
      --radius-card: 24px;
      --radius-pill: 100px;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--on-surf);
      font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
      font-size: 13px;
      -webkit-font-smoothing: antialiased
    }

    .sym {
      font-family: 'Material Symbols Outlined';
      font-weight: normal;
      font-style: normal;
      font-size: 20px;
      line-height: 1;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      white-space: nowrap;
      -webkit-font-feature-settings: 'liga';
      -webkit-font-smoothing: antialiased;
      font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
      user-select: none;
      vertical-align: middle
    }

    .sym-fill {
      font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24
    }

    .app {
      display: flex;
      flex-direction: column;
      height: 100vh
    }

    /* HEADER */
    .app-header {
      height: 64px;
      background: var(--surface);
      border-bottom: 1px solid var(--outline-var);
      padding: 0 8px 0 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0
    }

    .hdr-icon {
      color: var(--primary);
      font-size: 28px
    }

    .hdr-text {
      flex: 1
    }

    .hdr-text h1 {
      font-size: 16px;
      font-weight: 700;
      color: var(--on-surf);
      letter-spacing: -.3px
    }

    .hdr-text p {
      font-size: 11px;
      color: var(--on-surf-var)
    }

    .icon-btn {
      width: 44px;
      height: 44px;
      border: none;
      border-radius: 50%;
      background: transparent;
      color: var(--on-surf-var);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .18s, color .18s
    }

    .icon-btn:hover {
      background: var(--elev-2);
      color: var(--on-surf)
    }

    .icon-btn .sym {
      font-size: 22px
    }

    /* MAIN */
    .main-layout {
      flex: 1;
      display: flex;
      overflow: hidden;
      min-height: 0
    }

    /* LEFT PANEL */
    .left-panel {
      width: 340px;
      flex-shrink: 0;
      border-right: 1px solid var(--outline-var);
      background: var(--surf-c);
      display: flex;
      flex-direction: column;
      overflow: hidden
    }

    .left-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 12px 12px 0;
      display: flex;
      flex-direction: column;
      gap: 10px
    }

    .left-scroll::-webkit-scrollbar {
      width: 4px
    }

    .left-scroll::-webkit-scrollbar-track {
      background: transparent
    }

    .left-scroll::-webkit-scrollbar-thumb {
      background: var(--outline-var);
      border-radius: 8px
    }

    .left-scroll::-webkit-scrollbar-thumb:hover {
      background: var(--outline)
    }

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 220px;
      gap: 12px;
      text-align: center;
      color: var(--on-surf-var)
    }

    .empty-state .sym {
      font-size: 48px;
      opacity: .35
    }

    /* ACCORDION */
    .accordion {
      border-radius: 24px;
      border: 1px solid var(--outline-var);
      overflow: hidden;
      background: var(--surf-ch);
      transition: border-color .2s;
      flex-shrink: 0;
    }

    .accordion.has-sel {
      border-color: var(--mat-ac, var(--primary));
      box-shadow: 0 0 0 1px var(--mat-ac, var(--primary)) inset
    }

    .acc-hdr {
      padding: 12px 14px;
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      user-select: none;
      transition: background .14s
    }

    .acc-hdr:hover {
      background: var(--elev-1)
    }

    .color-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0
    }

    .acc-name {
      flex: 1;
      font-size: 12px;
      font-weight: 700;
      color: var(--on-surf);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis
    }

    .acc-meta {
      display: flex;
      align-items: center;
      gap: 5px
    }

    .chip {
      font-size: 10px;
      font-weight: 700;
      padding: 2px 10px;
      border-radius: 100px
    }

    .chip-cred {
      background: rgba(255, 255, 255, .06);
      color: var(--on-surf-var);
      border: 1px solid var(--outline-var)
    }

    .acc-chevron {
      color: var(--on-surf-var);
      font-size: 20px;
      transition: transform .25s cubic-bezier(.4, 0, .2, 1)
    }

    .accordion.collapsed .acc-chevron {
      transform: rotate(-90deg)
    }

    .acc-body {
      padding: 2px 10px 12px;
      display: flex;
      flex-direction: column;
      gap: 6px
    }

    .accordion.collapsed .acc-body {
      display: none
    }

    /* PARALELO ITEM */
    .par-item {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 10px 12px;
      border-radius: 20px;
      background: rgba(255, 255, 255, .03);
      border: 1px solid var(--outline-var);
      cursor: pointer;
      transition: background .14s, border-color .14s, opacity .2s
    }

    .par-item:hover:not(.par-off) {
      background: var(--elev-1)
    }

    .par-item.par-sel {
      background: color-mix(in srgb, var(--mat-ac, var(--primary)) 12%, transparent);
      border-color: var(--mat-ac, var(--primary))
    }

    .par-item.par-conflict {
      opacity: .3;
      pointer-events: none
    }

    .par-item.par-off {
      opacity: .45;
      pointer-events: none
    }

    .par-cb {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
      border: 1.5px solid var(--outline);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .15s, border-color .15s
    }

    .par-cb .sym {
      font-size: 14px;
      opacity: 0;
      transform: scale(.3);
      transition: opacity .15s, transform .18s
    }

    .par-cb.cb-on {
      background: var(--mat-ac, var(--primary));
      border-color: var(--mat-ac, var(--primary))
    }

    .par-cb.cb-on .sym {
      opacity: 1;
      transform: scale(1);
      color: var(--on-primary)
    }

    .par-content {
      flex: 1;
      min-width: 0
    }

    .par-badge {
      display: inline-block;
      font-size: 9px;
      font-weight: 700;
      padding: 1px 10px;
      border-radius: 100px;
      margin-bottom: 4px
    }

    .par-prof {
      font-size: 10px;
      color: var(--on-surf-var);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 4px
    }

    .par-slots {
      display: flex;
      flex-wrap: wrap;
      gap: 3px
    }

    .slot-pill {
      font-size: 9px;
      font-weight: 500;
      background: rgba(255, 255, 255, .05);
      border: 1px solid var(--outline-var);
      border-radius: 100px;
      padding: 2px 8px;
      color: var(--on-surf-var)
    }

    .conflict-icon {
      color: var(--error);
      flex-shrink: 0;
      margin-top: 1px;
      font-size: 18px
    }

    /* RIGHT PANEL */
    .right-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--bg)
    }

    .days-hdr {
      display: grid;
      grid-template-columns: 50px repeat(5, 1fr);
      border-bottom: 1px solid var(--outline-var);
      background: var(--surface);
      flex-shrink: 0
    }

    .day-hdr {
      padding: 10px 4px;
      text-align: center;
      font-size: 11px;
      font-weight: 700;
      color: var(--on-surf-var);
      text-transform: uppercase
    }

    .day-hdr.today {
      color: var(--primary)
    }

    .grid-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 12px 15px
    }

    .grid-scroll::-webkit-scrollbar {
      width: 5px
    }

    .grid-scroll::-webkit-scrollbar-track {
      background: transparent
    }

    .grid-scroll::-webkit-scrollbar-thumb {
      background: var(--outline-var);
      border-radius: 8px
    }

    .grid-scroll::-webkit-scrollbar-thumb:hover {
      background: var(--outline)
    }

    .schedule-grid {
      display: grid;
      grid-template-columns: 50px repeat(5, 1fr);
      position: relative
    }

    .time-gutter {
      grid-column: 1;
      grid-row: 1;
      position: relative
    }

    .t-label {
      position: absolute;
      right: 7px;
      font-size: 9px;
      font-weight: 600;
      color: var(--on-surf-var);
      opacity: .65;
      transform: translateY(-50%)
    }

    .day-col {
      position: relative;
      border-left: 1px solid var(--outline-var)
    }

    .h-line {
      position: absolute;
      left: 0;
      right: 0;
      height: 1px;
      background: var(--outline-var)
    }

    .hh-line {
      position: absolute;
      left: 0;
      right: 0;
      height: 1px;
      opacity: .35;
      background: repeating-linear-gradient(90deg, var(--outline-var) 0 3px, transparent 3px 6px)
    }

    .ev-block {
      position: absolute;
      left: 3px;
      right: 3px;
      border-radius: 12px;
      padding: 4px 8px;
      font-size: 10px;
      font-weight: 600;
      overflow: hidden;
      line-height: 1.35;
      z-index: 5;
      transition: transform .12s
    }

    /* FOOTER */
    .app-footer {
      height: 48px;
      border-top: 1px solid var(--outline-var);
      background: var(--surface);
      padding: 0 20px;
      display: flex;
      align-items: center;
      gap: 14px;
      flex-shrink: 0
    }

    .footer-cred {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--on-surf-var);
      line-height: 1
    }

    .cred-num {
      color: var(--primary);
      font-size: 18px;
      font-weight: 700;
      line-height: 1
    }

    .conflict-badge {
      display: none;
      align-items: center;
      gap: 4px;
      font-size: 10px;
      font-weight: 700;
      color: var(--error);
      background: rgba(255, 180, 171, .08);
      border: 1px solid rgba(255, 180, 171, .2);
      border-radius: 100px;
      padding: 4px 12px
    }

    .conflict-badge.show {
      display: flex
    }
  </style>
</head>

<body>
  <div class="app">
    <header class="app-header">
      <span class="sym hdr-icon">calendar_month</span>
      <div class="hdr-text">
        <h1>Planner</h1>
      </div>
      <button class="icon-btn" id="btn-deselect-all" title="Deseleccionar todos los paralelos">
        <span class="sym">deselect</span>
      </button>
      <button class="icon-btn" id="btn-collapse-all" title="Expandir todas las materias">
        <span class="sym">unfold_more</span>
      </button>
      <button class="icon-btn" id="btn-export-ics" title="Descargar horario como .ics">
        <span class="sym">calendar_add_on</span>
      </button>
      <button class="icon-btn" id="btn-toggle-calendar" title="Ocultar calendario">
        <span class="sym">calendar_view_week</span>
      </button>
    </header>

    <div class="main-layout">
      <aside class="left-panel">
        <div class="left-scroll" id="left-scroll">
          <div class="empty-state" id="empty-state">
            <span class="sym">school</span>
            <p>No hay materias guardadas</p>
            <small>Ve al Académico y usa el botón "Añadir"</small>
          </div>
        </div>
      </aside>

      <section class="right-panel">
        <div class="days-hdr">
          <div class="day-hdr"></div>
          <div class="day-hdr" data-di="0">Lun</div>
          <div class="day-hdr" data-di="1">Mar</div>
          <div class="day-hdr" data-di="2">Mié</div>
          <div class="day-hdr" data-di="3">Jue</div>
          <div class="day-hdr" data-di="4">Vie</div>
        </div>
        <div class="grid-scroll">
          <div class="schedule-grid" id="schedule-grid"></div>
        </div>
      </section>
    </div>

    <footer class="app-footer">
      <div class="footer-cred">
        <span class="sym">star</span>
        Créditos: <span class="cred-num" id="cred-num">0</span>
      </div>
      <div class="f-spacer" style="flex:1"></div>
      <div class="conflict-badge" id="conflict-badge">
        <span class="sym">warning</span>
        Conflictos detectados
      </div>
    </footer>
  </div>

  <!-- ═══════════════════════════════════════════════════════════
     ORDEN DE CARGA DE SCRIPTS
     1. utils.js        → constantes y funciones puras
     2. storage.js      → capa chrome.storage
     3. exporter.js     → generación de archivo .poli
     4. ics-exporter.js → generación de archivo .ics
     5. planner-ui.js   → renderizado de grilla y acordeones
     6. planner.js      → orquestador: listeners y arranque
     ═══════════════════════════════════════════════════════════ -->
  <script src="../shared/utils.js"></script>
  <script src="../shared/storage.js"></script>
  <script src="../shared/exporter.js"></script>
  <script src="../shared/ics-exporter.js"></script>
  <script src="planner-ui.js"></script>
  <script src="planner.js"></script>
</body>

</html>
